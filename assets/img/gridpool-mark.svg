<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">GridPool mark</title>
  <desc id="desc">A Grid Labs style circuit mark flowing into a shared pool node.</desc>
  <defs>
    <filter id="purple-glow" x="-45%" y="-45%" width="190%" height="190%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0.6 0 0 0 0.42 0 0.08 0 0 0.03 0 0 1 0 1 0 0 0 0.75 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="band" x1="16" x2="112" y1="68" y2="68" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b0054"/>
      <stop offset="0.5" stop-color="#8c35ff"/>
      <stop offset="1" stop-color="#2b0054"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="#040506"/>
  <path d="M20 50h28V18m60 32H80V18M32 78h20v32m44-32H76v32M64 36v76" fill="none" stroke="#4d4d4d" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M20 64h88" stroke="url(#band)" stroke-width="24" stroke-linecap="round" filter="url(#purple-glow)"/>
  <path d="M28 64h72" stroke="#9b35ff" stroke-width="7" stroke-linecap="round"/>
  <path d="M34 64h16m14 0h30" stroke="#58f07c" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <circle cx="48" cy="18" r="7" fill="#f1f4ed"/>
  <circle cx="80" cy="18" r="7" fill="#f1f4ed"/>
  <circle cx="20" cy="50" r="7" fill="#f1f4ed"/>
  <circle cx="108" cy="50" r="7" fill="#f1f4ed"/>
  <circle cx="52" cy="110" r="7" fill="#4d4d4d"/>
  <circle cx="76" cy="110" r="7" fill="#4d4d4d"/>
  <circle cx="64" cy="64" r="11" fill="#040506" stroke="#58f07c" stroke-width="4"/>
  <circle cx="64" cy="64" r="3.5" fill="#ffb23f"/>
